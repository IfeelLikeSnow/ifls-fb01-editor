name: Release (tag)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version
        run: echo "VER=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build asset ZIP (reaper/)
        run: |
          bash tools/build_release_zip.sh "${VER}"
          ls -la dist

      - name: Create GitHub Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "IFLS FB-01 Editor v${{ env.VER }}"
          files: |
            dist/ifls-fb01-editor_${{ env.VER }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
